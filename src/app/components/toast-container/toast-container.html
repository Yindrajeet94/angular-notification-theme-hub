<!-- Toast notifications stack at the top-right corner -->
<div class="toast-container">
    <!--
        *ngFor="let toast of activeToasts"
        ─────────────────────────────────
        Loops through the active toasts array.
        Like @foreach (var toast in ActiveToasts) in Razor.

        Angular also gives us access to:
        - index: the loop index
        - first/last: boolean flags
        - even/odd: for alternating styles
      -->
    <div *ngFor="let toast of activeToasts; let i = index" class="toast"
        [class.toast-success]="toast.type === 'success'" [class.toast-error]="toast.type === 'error'"
        [class.toast-warning]="toast.type === 'warning'" [class.toast-info]="toast.type === 'info'"
        [style.animation-delay]="i * 0.1 + 's'">

        <!-- Icon based on type -->
        <span class="toast-icon">
            {{ toast.type === 'success' ? '✅' :
            toast.type === 'error' ? '❌' :
            toast.type === 'warning' ? '⚠️' : 'ℹ️' }}
        </span>

        <div class="toast-content">
            <p class="toast-message">{{ toast.message }}</p>
            <span class="toast-time">{{ formatTime(toast.timestamp) }}</span>
        </div>

        <!-- Dismiss button -->
        <button class="toast-close" (click)="dismissToast(toast.id)">✕</button>
    </div>
</div>
